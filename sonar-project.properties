# SonarQube project configuration for hybrid-framework
# Run local analysis with: npm run sonar
# Requires a running SonarQube Community instance (see docker-compose.sonar.yml)
#
# First-time setup:
#   1. Start SonarQube: docker compose -f docker-compose.sonar.yml up -d
#   2. Open http://localhost:9000 (default login: admin / admin)
#   3. Change the password when prompted
#   4. Create a project with key "hybrid-framework"
#   5. Generate a token under My Account > Security > Generate Tokens
#   6. Set the token: export SONAR_TOKEN=<your-token>
#   7. Configure the quality gate in the SonarQube UI:
#      - Duplicated Lines: max 3%
#      - Code Smells: Rating A (max 5% of lines)
#      - Bugs: Rating A
#      - Cognitive Complexity: max 15 per function

sonar.projectKey=hybrid-framework
sonar.projectName=Hybrid Framework

# Source and test paths
sonar.sources=src
sonar.tests=tests

# Language
sonar.language=ts

# Coverage report (generated by vitest with lcov reporter)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=node_modules/**,dist/**,**/*.config.ts,**/config/**

# Duplication thresholds (tighter than SonarQube defaults)
sonar.cpd.ts.minimumTokens=50
sonar.cpd.ts.minimumLines=6
