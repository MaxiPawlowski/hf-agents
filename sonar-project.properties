# SonarQube project configuration for hybrid-framework
# Run local analysis with: npm run sonar
# Requires a running SonarQube Community instance (see docker-compose.sonar.yml)
#
# First-time setup:
#   1. Start SonarQube: docker compose -f docker-compose.sonar.yml up -d
#   2. Open http://localhost:9000 (default login: admin / admin)
#   3. Change the password when prompted
#   4. Create a project: Administration > Projects > Create Project > Manually
#      - Project key:  hybrid-framework
#      - Display name: Hybrid Framework
#      - Click "Set Up", choose "Locally" as the analysis method
#   5. Generate a project token (e.g. "hybrid-framework-local"); copy it (shown only once)
#   6. Export the token in your shell profile (do NOT commit this value):
#        export SONAR_TOKEN=<your-token>   # bash/zsh
#        $env:SONAR_TOKEN="<your-token>"   # PowerShell
#   7. Run coverage first (so SonarQube can display it):
#        npm run test:coverage
#   8. Run the scanner: npm run sonar
#   9. Configure the quality gate in the SonarQube UI:
#      - Duplicated Lines: max 3%
#      - Code Smells: Rating A (max 5% of lines)
#      - Bugs: Rating A
#      - Cognitive Complexity: max 15 per function
#
# IMPORTANT: Never put the SONAR_TOKEN value in this file or any tracked file.
#            The sonarqube-scanner package reads it from the SONAR_TOKEN env var automatically.

sonar.projectKey=hybrid-framework
sonar.projectName=Hybrid Framework

# Source and test paths
sonar.sources=src,scripts
sonar.tests=tests

# Coverage report (generated by: npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=node_modules/**,dist/**,**/*.config.ts,**/config/**
sonar.inclusions=src/**/*.ts,tests/**/*.ts,scripts/**/*.mjs

# Duplication thresholds (tighter than SonarQube defaults)
sonar.cpd.ts.minimumTokens=50
sonar.cpd.ts.minimumLines=6
